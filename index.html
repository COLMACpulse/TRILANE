<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TRILANE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 20px;
    }

    h1 { margin-bottom: 6px; }

    .modes {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
    }

    .mode-btn {
      padding: 8px 14px;
      border: 1px solid #444;
      background: #222;
      cursor: pointer;
    }

    .active {
      background: #0a84ff;
      border-color: #0a84ff;
    }

    textarea {
      width: 100%;
      height: 110px;
      background: #222;
      color: #eee;
      border: 1px solid #444;
      padding: 10px;
      font-size: 16px;
      resize: none;
    }

    button {
      margin-top: 10px;
      padding: 12px 20px;
      font-size: 16px;
      background: #0a84ff;
      border: none;
      color: white;
      cursor: pointer;
    }

    .card {
      margin-top: 20px;
      padding: 15px;
      background: #1a1a1a;
      border: 1px solid #333;
    }

    .section { margin-bottom: 14px; }
    .label { font-weight: bold; margin-bottom: 4px; }
    .tradeoff { font-size: 13px; color: #aaa; margin-top: 4px; }
  </style>
</head>

<body>

  <h1>TRILANE</h1>
  <p>Turn problems into action.</p>

  <div class="modes">
    <div id="brutalBtn" class="mode-btn active" onclick="setMode('brutal')">BRUTAL</div>
    <div id="guidedBtn" class="mode-btn" onclick="setMode('guided')">GUIDED</div>
  </div>

  <textarea id="problemInput" placeholder="What's the problem?"></textarea>
  <button onclick="resolveProblem()">Resolve</button>

  <div id="output"></div>

  <script src="engine.js"></script>
</body>
</html>
