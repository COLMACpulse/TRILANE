<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>TRILANE</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --bg: #0d1117;
      --bg2: #121826;
      --panel: rgba(18, 24, 38, 0.78);
      --panel-border: rgba(255,255,255,0.08);
      --text: #e8edf5;
      --muted: #a8b1c0;
      --blue: #4da3ff;
      --blue-soft: rgba(77,163,255,0.18);
      --card: rgba(9, 13, 21, 0.72);
    }

    * {
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      color: var(--text);
      margin: 0;
      min-height: 100vh;
      padding: 28px 20px;
      background:
        radial-gradient(circle at top left, rgba(77,163,255,0.18), transparent 30%),
        radial-gradient(circle at bottom right, rgba(93,211,158,0.10), transparent 28%),
        linear-gradient(180deg, var(--bg2), var(--bg));
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 32px 32px;
      mask-image: linear-gradient(to bottom, rgba(0,0,0,0.45), rgba(0,0,0,0.12));
    }

    .wrap {
      width: 100%;
      max-width: 860px;
      margin: 0 auto;
      position: relative;
      z-index: 1;
    }

    .hero {
      margin-bottom: 16px;
    }

    h1 {
      margin: 0 0 6px 0;
      font-size: 34px;
      letter-spacing: 0.04em;
    }

    .sub {
      margin: 0 0 18px 0;
      color: var(--muted);
      font-size: 15px;
    }

    .shell {
      background: var(--panel);
      border: 1px solid var(--panel-border);
      border-radius: 18px;
      padding: 18px;
      backdrop-filter: blur(12px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
    }

    .modes {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .mode-btn {
      padding: 9px 14px;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 12px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      cursor: pointer;
      user-select: none;
      transition: 0.15s ease;
    }

    .mode-btn:hover {
      background: rgba(255,255,255,0.07);
    }

    .active {
      background: var(--blue-soft);
      border-color: rgba(77,163,255,0.45);
      box-shadow: inset 0 0 0 1px rgba(77,163,255,0.2);
    }

    textarea {
      width: 100%;
      height: 120px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
      resize: none;
      outline: none;
    }

    textarea:focus {
      border-color: rgba(77,163,255,0.5);
      box-shadow: 0 0 0 3px rgba(77,163,255,0.12);
    }

    button {
      margin-top: 12px;
      padding: 12px 18px;
      font-size: 15px;
      font-weight: 600;
      background: linear-gradient(180deg, #58acff, #2f86e6);
      border: none;
      border-radius: 12px;
      color: white;
      cursor: pointer;
      box-shadow: 0 10px 24px rgba(47, 134, 230, 0.28);
    }

    button:hover {
      filter: brightness(1.04);
    }

    .card {
      margin-top: 18px;
      padding: 18px;
      background: var(--card);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 18px;
      box-shadow: 0 18px 50px rgba(0,0,0,0.26);
    }

    .section {
      margin-bottom: 16px;
      padding-bottom: 14px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .section:last-child {
      margin-bottom: 0;
      padding-bottom: 0;
      border-bottom: none;
    }

    .label {
      font-size: 12px;
      letter-spacing: 0.08em;
      color: #8fbfff;
      margin-bottom: 6px;
      font-weight: 700;
    }

    #output:empty {
      display: none;
    }

    @media (max-width: 640px) {
      body {
        padding: 18px 14px;
      }

      h1 {
        font-size: 28px;
      }

      .shell,
      .card {
        border-radius: 16px;
      }
    }
  </style>
</head>

<body>
  <div class="wrap">
    <div class="hero">
      <h1>TRILANE</h1>
      <p class="sub">Turn problems into action.</p>
    </div>

    <div class="shell">
      <div class="modes">
        <div id="brutalBtn" class="mode-btn active" onclick="setMode('brutal')">BRUTAL</div>
        <div id="guidedBtn" class="mode-btn" onclick="setMode('guided')">GUIDED</div>
      </div>

      <textarea id="problemInput" placeholder="What's the problem?"></textarea>
      <button onclick="resolveProblem()">Resolve</button>

      <div id="output"></div>
    </div>
  </div>

  <script src="engine.js"></script>
</body>
</html>
